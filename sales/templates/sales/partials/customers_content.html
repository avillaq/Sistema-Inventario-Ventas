<div x-data="{ customerModalOpen: false }" class="flex flex-col gap-4">
  <div class="flex flex-col gap-2 lg:flex-row lg:items-end lg:justify-between">
    <div>
      <h1 class="text-xl font-semibold text-neutral">Clientes</h1>
      <p class="text-sm text-base-content/60">{{ customer_count|default:0 }} registros.</p>
    </div>
    <button
      type="button"
      class="btn btn-primary btn-sm"
      @click="customerModalOpen = true"
      hx-get="{% url 'sales:customer_create' %}?current_q={{ current_q|urlencode }}"
      hx-target="#customer-modal-body"
      hx-swap="innerHTML"
      hx-indicator="#nav-spinner"
    >
      Nuevo cliente
    </button>
  </div>

  <section class="panel p-3">
    <form
      method="get"
      class="grid gap-2 md:grid-cols-[1fr_auto]"
      hx-get="{% url 'sales:customers' %}"
      hx-trigger="input changed delay:300ms"
      hx-target="#dashboard-content"
      hx-swap="innerHTML"
      hx-push-url="true"
      hx-indicator="#nav-spinner"
    >
      <label class="form-control">
        <div class="label py-1"><span class="label-text text-xs">Buscar</span></div>
        <input
          type="search"
          name="q"
          value="{{ filters.q }}"
          placeholder="Nombre, documento, correo o telefono"
          class="input input-sm w-full"
        >
      </label>
      <a
        href="{% url 'sales:customers' %}"
        class="btn btn-ghost btn-sm self-end"
        hx-get="{% url 'sales:customers' %}"
        hx-target="#dashboard-content"
        hx-swap="innerHTML"
        hx-push-url="true"
        hx-indicator="#nav-spinner"
      >
        Limpiar
      </a>
    </form>
  </section>

  <section class="panel overflow-hidden">
    <div class="flex items-center justify-between border-b border-base-300 px-4 py-2">
      <h2 class="text-sm font-semibold text-neutral">Directorio</h2>
      <span class="badge badge-sm">{{ customer_count|default:0 }} clientes</span>
    </div>
    <div id="customer-table">
      {% include "sales/partials/customer_table.html" %}
    </div>
  </section>

  <div class="modal modal-middle" :class="{ 'modal-open': customerModalOpen }">
    <div class="modal-box max-w-xl p-0">
      <div id="customer-modal-body">
        {% include "sales/partials/customer_form.html" with form=form form_title="Nuevo cliente" submit_label="Guardar" current_q=current_q %}
      </div>
    </div>
    <button type="button" class="modal-backdrop" @click="customerModalOpen = false">Cerrar</button>
  </div>
</div>
