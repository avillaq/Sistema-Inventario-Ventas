<!doctype html>
<html lang="es-PE" data-theme="corporate">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Dashboard{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
  <style>
    body {
      font-family: "Inter", sans-serif;
    }

    .panel {
      background: var(--color-base-100);
      border: 1px solid var(--color-base-300);
      border-radius: 0.5rem;
    }

    .nav-link {
      position: relative;
      border-radius: 0.5rem;
      font-weight: 500;
      transition: background-color 160ms ease, color 160ms ease, box-shadow 160ms ease;
    }

    .nav-link.active {
      background: color-mix(in srgb, #000 10%, transparent);
      color: #000;
      box-shadow: inset 0 0 0 1px color-mix(in srgb, #000 12%, transparent);
      font-weight: 600;
    }

    .htmx-indicator {
      opacity: 0;
      transition: opacity 200ms ease;
    }

    .htmx-request .htmx-indicator {
      opacity: 1;
    }

    [x-cloak] {
      display: none !important;
    }
  </style>
</head>
<body class="min-h-screen bg-base-200 text-base-content">
  <div class="drawer min-h-screen lg:drawer-open">
    <input id="dashboard-drawer" type="checkbox" class="drawer-toggle">
    <div class="drawer-content flex min-h-screen flex-col">
      <header class="navbar sticky top-0 z-20 min-h-14 border-b border-base-300 bg-base-100 px-3">
        <div class="navbar-start gap-2">
          <label for="dashboard-drawer" class="btn btn-ghost btn-sm btn-square lg:hidden" aria-label="Abrir menu">
            <span class="text-lg">☰</span>
          </label>
          <div>
            <div class="text-sm font-semibold text-neutral">Inventario y ventas</div>
            <div class="text-xs text-base-content/60">Operacion interna</div>
          </div>
        </div>
        <div class="navbar-end gap-2">
          <div class="flex min-w-8 justify-center">
            <span id="nav-spinner" class="htmx-indicator">
              <span class="loading loading-dots loading-sm"></span>
            </span>
          </div>
        </div>
      </header>

      <main id="dashboard-content" class="flex-1 p-3 lg:p-4">
        {% block content %}{% endblock %}
      </main>
    </div>

    <div class="drawer-side">
      <label for="dashboard-drawer" class="drawer-overlay"></label>
      <aside class="min-h-screen w-64 border-r border-base-300 bg-base-100 p-3">
        <div class="mb-3 rounded-lg border border-base-300 bg-base-200 px-3 py-3">
          <div class="text-base font-semibold text-neutral">POS Central</div>
        </div>

        <ul class="menu w-full gap-1 p-0 text-sm">
          <li>
            <a
              class="nav-link"
              href="{% url 'dashboard' %}"
              hx-get="{% url 'dashboard' %}"
              hx-target="#dashboard-content"
              hx-swap="innerHTML"
              hx-push-url="true"
              hx-indicator="#nav-spinner"
            >
              Dashboard
            </a>
          </li>
          <li>
            <a
              class="nav-link"
              href="{% url 'sales:pos' %}"
              hx-get="{% url 'sales:pos' %}"
              hx-target="#dashboard-content"
              hx-swap="innerHTML"
              hx-push-url="true"
              hx-indicator="#nav-spinner"
            >
              POS / Caja
            </a>
          </li>
          <li>
            <a
              class="nav-link"
              href="{% url 'inventory:overview' %}"
              hx-get="{% url 'inventory:overview' %}"
              hx-target="#dashboard-content"
              hx-swap="innerHTML"
              hx-push-url="true"
              hx-indicator="#nav-spinner"
            >
              Inventario
            </a>
          </li>
          <li>
            <a
              class="nav-link"
              href="{% url 'sales:customers' %}"
              hx-get="{% url 'sales:customers' %}"
              hx-target="#dashboard-content"
              hx-swap="innerHTML"
              hx-push-url="true"
              hx-indicator="#nav-spinner"
            >
              Clientes
            </a>
          </li>
          <li>
            <a
              class="nav-link"
              href="{% url 'sales:history' %}"
              hx-get="{% url 'sales:history' %}"
              hx-target="#dashboard-content"
              hx-swap="innerHTML"
              hx-push-url="true"
              hx-indicator="#nav-spinner"
            >
              Ventas
            </a>
          </li>
        </ul>

        <div class="mt-4 rounded-lg border border-base-300 bg-base-200 px-3 py-2">
          <div class="text-xs text-base-content/60">IGV configurado</div>
          <div class="text-sm font-semibold text-neutral">18%</div>
        </div>
      </aside>
    </div>
  </div>

  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
  <script>
    function setActiveNav() {
      const currentPath = window.location.pathname.replace(/\/$/, "") || "/";
      document.querySelectorAll(".nav-link").forEach((link) => {
        try {
          const linkPath = new URL(link.href).pathname.replace(/\/$/, "") || "/";
          link.classList.toggle("active", linkPath === currentPath);
        } catch (error) {
          link.classList.remove("active");
        }
      });
    }

    function setDocumentTitle() {
      const currentPath = window.location.pathname.replace(/\/$/, "") || "/";
      const titles = {
        "/": "Dashboard",
        "/pos": "POS",
        "/inventory": "Inventario",
        "/pos/customers": "Clientes",
        "/pos/history": "Historial de Ventas",
      };
      document.title = titles[currentPath] || document.querySelector("h1")?.textContent?.trim() || "Dashboard";
    }

    function initPosDashboardCharts() {
      if (typeof Chart === "undefined") {
        return;
      }

      const dataHolder = document.getElementById("dashboard-charts-data");
      const charts = window.posDashboardCharts || {};

      const destroyChart = (key) => {
        if (charts[key]) {
          charts[key].destroy();
          delete charts[key];
        }
      };

      if (!dataHolder) {
        Object.keys(charts).forEach((key) => destroyChart(key));
        window.posDashboardCharts = {};
        return;
      }

      const salesData = JSON.parse(dataHolder.dataset.sales || "[]");
      const topProductsData = JSON.parse(dataHolder.dataset.topProducts || "[]");
      const currency = dataHolder.dataset.currency || "PEN";
      const formatMoney = (value) => `${currency} ${Number(value || 0).toFixed(2)}`;

      const salesCanvas = document.getElementById("sales-7d-chart");
      if (salesCanvas) {
        destroyChart("sales");
        const salesLabels = salesData.map((item) => item.label);
        const salesTotals = salesData.map((item) => item.total);
        const salesCounts = salesData.map((item) => item.count);
        charts.sales = new Chart(salesCanvas, {
          type: "line",
          data: {
            labels: salesLabels,
            datasets: [
              {
                label: "Monto",
                data: salesTotals,
                borderColor: "rgba(59, 130, 246, 0.9)",
                backgroundColor: "rgba(59, 130, 246, 0.2)",
                pointRadius: 3,
                tension: 0.35,
                fill: true,
                yAxisID: "y",
              },
              {
                label: "Tickets",
                data: salesCounts,
                borderColor: "rgba(34, 197, 94, 0.9)",
                backgroundColor: "rgba(34, 197, 94, 0.2)",
                pointRadius: 3,
                tension: 0.35,
                fill: false,
                yAxisID: "y1",
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: "index", intersect: false },
            plugins: {
              legend: { position: "bottom" },
              tooltip: {
                callbacks: {
                  label: (context) => {
                    const value = context.parsed.y ?? 0;
                    if (context.dataset.label === "Monto") {
                      return `${context.dataset.label}: ${formatMoney(value)}`;
                    }
                    return `${context.dataset.label}: ${Math.round(value)}`;
                  },
                },
              },
            },
            scales: {
              y: {
                beginAtZero: true,
                ticks: {
                  callback: (value) => formatMoney(value),
                },
              },
              y1: {
                beginAtZero: true,
                position: "right",
                grid: { drawOnChartArea: false },
                ticks: { precision: 0 },
              },
            },
          },
        });
      } else {
        destroyChart("sales");
      }

      const topCanvas = document.getElementById("top-products-chart");
      if (topCanvas) {
        destroyChart("topProducts");
        const topLabels = topProductsData.map((item) => item.name);
        const topQuantities = topProductsData.map((item) => item.quantity);
        const topTotals = topProductsData.map((item) => item.total);
        charts.topProducts = new Chart(topCanvas, {
          type: "bar",
          data: {
            labels: topLabels,
            datasets: [
              {
                label: "Cantidad",
                data: topQuantities,
                backgroundColor: "rgba(14, 165, 233, 0.8)",
                borderColor: "rgba(14, 165, 233, 1)",
                borderWidth: 1,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            indexAxis: "y",
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: (context) => {
                    const quantity = context.parsed.x ?? 0;
                    const total = topTotals[context.dataIndex] ?? 0;
                    return `Cantidad: ${quantity} | Total: ${formatMoney(total)}`;
                  },
                },
              },
            },
            scales: {
              x: {
                beginAtZero: true,
                ticks: { precision: 0 },
              },
            },
          },
        });
      } else {
        destroyChart("topProducts");
      }

      window.posDashboardCharts = charts;
    }

    function posCart(config) {
      const safeConfig = config || {};
      const decimals = Number(safeConfig.decimals);
      const taxRate = Number(safeConfig.taxRate);

      return {
        currency: safeConfig.currency || "PEN",
        decimals: Number.isFinite(decimals) ? decimals : 2,
        taxRate: Number.isFinite(taxRate) ? taxRate : 0,
        checkoutModalOpen: false,
        selectedCustomerId: "",
        items: [],

        clearServerMessage() {
          const message = document.getElementById("checkout-message");
          if (message) {
            message.innerHTML = "";
          }
        },

        showCartMessage(message) {
          const container = document.getElementById("checkout-message");
          if (!container) {
            return;
          }
          container.innerHTML = "";
          const alert = document.createElement("div");
          alert.setAttribute("role", "alert");
          alert.className = "alert alert-warning alert-soft py-2";
          const wrapper = document.createElement("div");
          const title = document.createElement("div");
          title.className = "font-semibold";
          title.textContent = "Stock disponible alcanzado";
          const body = document.createElement("div");
          body.className = "text-sm";
          body.textContent = message;
          wrapper.append(title, body);
          alert.appendChild(wrapper);
          container.appendChild(alert);
        },

        addItem(data) {
          const id = Number(data.id);
          if (!id) {
            return;
          }
          const stock = Math.max(0, Number(data.stock || 0));

          const existing = this.items.find((item) => item.id === id);
          if (existing) {
            if (existing.quantity >= existing.maxStock) {
              this.showCartMessage(`${existing.name} solo tiene ${existing.maxStock} unidades disponibles.`);
              return;
            }
            existing.quantity += 1;
            this.clearServerMessage();
            return;
          }

          if (stock <= 0) {
            this.showCartMessage(`${data.name || "Este producto"} no tiene stock disponible.`);
            return;
          }

          this.items.push({
            id,
            name: data.name || "Item",
            barcode: data.barcode || "",
            unitPrice: Number(data.price || 0),
            maxStock: stock,
            quantity: 1,
          });
          this.clearServerMessage();
        },

        increment(id) {
          const item = this.items.find((entry) => entry.id === id);
          if (item) {
            if (item.quantity >= item.maxStock) {
              this.showCartMessage(`${item.name} solo tiene ${item.maxStock} unidades disponibles.`);
              return;
            }
            item.quantity += 1;
            this.clearServerMessage();
          }
        },

        decrement(id) {
          const item = this.items.find((entry) => entry.id === id);
          if (!item) {
            return;
          }
          if (item.quantity <= 1) {
            this.remove(id);
            return;
          }
          item.quantity -= 1;
          this.clearServerMessage();
        },

        normalizeQuantity(item) {
          if (!item) {
            return;
          }
          if (!item.quantity || item.quantity < 1) {
            this.remove(item.id);
            return;
          }
          if (item.quantity > item.maxStock) {
            item.quantity = item.maxStock;
            this.showCartMessage(`${item.name} solo tiene ${item.maxStock} unidades disponibles.`);
            return;
          }
          this.clearServerMessage();
        },

        remove(id) {
          this.items = this.items.filter((entry) => entry.id !== id);
          this.clearServerMessage();
        },

        subtotal() {
          return this.items.reduce(
            (sum, item) => sum + item.unitPrice * item.quantity,
            0
          );
        },

        taxAmount() {
          return this.roundMoney(this.subtotal() * this.taxRate);
        },

        total() {
          return this.roundMoney(this.subtotal() + this.taxAmount());
        },

        roundMoney(value) {
          const factor = Math.pow(10, this.decimals);
          return Math.round(value * factor) / factor;
        },

        formatMoney(value) {
          return new Intl.NumberFormat("es-PE", {
            style: "currency",
            currency: this.currency,
            minimumFractionDigits: this.decimals,
            maximumFractionDigits: this.decimals,
          }).format(this.roundMoney(value));
        },

        itemsPayload() {
          return this.items.map((item) => ({
            product_id: item.id,
            quantity: item.quantity,
          }));
        },

        serializedItems() {
          return JSON.stringify(this.itemsPayload());
        },

        clearCart(clearMessage = true) {
          this.items = [];
          if (clearMessage) {
            this.clearServerMessage();
          }
        },

        refreshProducts() {
          const form = document.getElementById("product-search-form");
          if (form && window.htmx) {
            const url = new URL(form.getAttribute("hx-get"), window.location.origin);
            const params = new URLSearchParams(new FormData(form));
            url.search = params.toString();
            htmx.ajax("GET", url.pathname + url.search, {
              target: "#product-results",
              swap: "innerHTML",
            });
          }
        },

        completeSale() {
          this.clearCart(false);
          this.selectedCustomerId = "";
          this.checkoutModalOpen = false;
          this.refreshProducts();
        },
      };
    }

    document.addEventListener("DOMContentLoaded", () => {
      setActiveNav();
      setDocumentTitle();
      initPosDashboardCharts();
      if (window.htmx) {
        htmx.config.selfRequestsOnly = true;
        htmx.config.allowScriptTags = false;
      }
    });

    document.addEventListener("htmx:afterSwap", (event) => {
      setActiveNav();
      setDocumentTitle();
      initPosDashboardCharts();
    });

    window.addEventListener("popstate", () => {
      setActiveNav();
      setDocumentTitle();
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
